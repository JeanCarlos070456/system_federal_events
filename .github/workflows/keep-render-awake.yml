name: Keep Render Awake

on:
  schedule:
    # Segunda a sábado, das 11h às 23h UTC
    # Aproximadamente 08h às 20h no Brasil
    - cron: "*/14 11-23 * * 1-6"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS -L --max-time 30 --retry 2 --retry-delay 5 "${{ secrets.RENDER_APP_URL }}/health/"